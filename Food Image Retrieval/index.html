<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Retrieval</title>
<style>
    #results img {
        width: 200px;
        margin: 10px;
        border: 1px solid #ccc;
    }
    #results {
        display: flex;
        flex-wrap: wrap;
    }
    #status {
        margin-top: 15px;
        font-weight: bold;
        color: #333;
        font-size: 16px;
    }

    /* Spinner */
    .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-left: 10px;
    }
    @keyframes spin {
        0% { transform: rotate(0deg);}
        100% { transform: rotate(360deg);}
    }
</style>
</head>
<body>

<h1>Upload Image</h1>

<input type="file" id="imageInput">
<button id="searchBtn">Search</button>

<div id="status"></div>
<div id="results"></div>

<script src="script.js"></script>
</body>
</html>
